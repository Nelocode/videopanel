version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videopanel-backend
    restart: unless-stopped
    volumes:
      - backend-data:/app/data
      - audio-tmp:/tmp/videopanel
    environment:
      - DB_PATH=/app/data/videopanel.db
      - TEMP_DIR=/tmp/videopanel
    networks:
      - app-net
    # Backend is NOT exposed publicly — only the frontend talks to it
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videopanel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - app-net

volumes:
  backend-data:
    driver: local
  audio-tmp:
    driver: local

networks:
  app-net:
    driver: bridge
