version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videopanel-backend
    restart: unless-stopped
    volumes:
      - backend-data:/app/data
      - audio-tmp:/tmp/videopanel
    environment:
      - DB_PATH=/app/data/videopanel.db
      - TEMP_DIR=/tmp/videopanel
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videopanel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    labels:
      # Labels that tell EasyPanel/Traefik to route the web traffic here
      - "traefik.enable=true"
      - "traefik.http.routers.videopanel-frontend.rule=Host(`${EASYPANEL_DOMAIN:-localhost}`)"
      - "traefik.http.services.videopanel-frontend.loadbalancer.server.port=3000"

volumes:
  backend-data:
    driver: local
  audio-tmp:
    driver: local
